name: Sync Luma events

on:
  schedule:
    # Every 6 hours (off the top of the hour to be kind to Luma's API).
    - cron: "23 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync events from Luma
        run: node scripts/sync-luma-events.mjs

      - name: Refresh gallery manifest
        run: node scripts/sync-event-galleries.mjs

      - name: Commit and push if events changed
        run: |
          git add src/data/luma-events.generated.json src/data/event-galleries.generated.json
          # generatedAt changes every run; only commit when event/gallery data actually differs.
          if git diff --cached --ignore-matching-lines='"generatedAt"' --quiet; then
            echo "No event changes; skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync Luma events"
          git push
